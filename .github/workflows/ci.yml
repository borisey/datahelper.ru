name: CI/CD

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Deploy to server via git pull
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            echo "Переходим в основную директорию приложения..."
            cd /var/www/datahelper.ru || { echo "Директория не найдена"; exit 1; }

            echo "Пуллим последние изменения из Git основной директории..."
            git pull origin master || { echo "Ошибка при git pull"; exit 1; }

            echo "Все файлы обновлены"